apiVersion: v1
kind: ConfigMap
metadata:
  name: mydocs-config
  namespace: mydocs
data:
  parser.yml: |
    azure_di_model: prebuilt-layout
    azure_di_kwargs:
      output_content_format: text
      features:
        - keyValuePairs
    use_cache: true
    page_embeddings:
      - model: azure/text-embedding-3-large
        field_to_embed: content_markdown
        target_field: emb_content_markdown_text_embedding_3_large
        dimensions: 3072
